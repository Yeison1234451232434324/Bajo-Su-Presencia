<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Publicar Noticia – Bajo Su Presencia</title>
  <link rel="stylesheet" href="panel.css" />
  <link rel="stylesheet" href="noticias.css" />
</head>
<body>

  <main class="main" id="main">
    <section class="panel active" style="display:block;">
      <div class="panel-header">
        <h2>Publicar Noticia</h2>
        <p>Comparte novedades con la comunidad</p>
      </div>
      <div class="form-card">
        <form onsubmit="submitNews(event)">
          <div class="form-group">
            <label>Título de la Noticia</label>
            <input type="text" class="form-control" placeholder="Ej: Inauguración del Nuevo Salón de Oración" required />
          </div>
          <div class="form-group">
            <label>Resumen Breve</label>
            <textarea class="form-control" rows="2"
              placeholder="Resumen que aparecerá en la tarjeta de vista previa" required></textarea>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Fecha</label>
              <input type="date" class="form-control" required />
            </div>
            <div class="form-group">
              <label>Autor</label>
              <input type="text" class="form-control" placeholder="Ej: Pastor Miguel Ángel" required />
            </div>
          </div>
          <div class="form-group">
            <label>URL de la Imagen</label>
            <input type="url" class="form-control" placeholder="https://ejemplo.com/imagen.jpg" />
          </div>
          <div class="form-group">
            <label>Contenido Completo</label>
            <textarea class="form-control" rows="6"
              placeholder="Contenido completo de la noticia (opcional)"></textarea>
          </div>
          <button type="submit" class="btn-submit">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:1.15rem;height:1.15rem;">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            Publicar Noticia
          </button>
        </form>
      </div>
    </section>
  </main>

  <script src="../../../controllers/sidebar.colaborador.controller.js"></script>
  <script src="../../../controllers/noticias.controller.js"></script>
</body>
</html>
