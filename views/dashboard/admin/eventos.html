<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Publicar Evento – Bajo Su Presencia</title>
  <link rel="stylesheet" href="panel.css" />
  <link rel="stylesheet" href="eventos.css" />
</head>
<body>

<main class="main" id="main">
  <section class="panel active" style="display:block;">

    <!-- Encabezado -->
    <div class="panel-header">
      <h2>Publicar Evento</h2>
      <p>Crea un nuevo evento y asigna los recursos del inventario</p>
    </div>

    <!-- ══ FORMULARIO ══════════════════════════════════════════════════════ -->
    <div class="form-card">
      <form id="form-evento" onsubmit="submitEvent(event)" novalidate>

        <!-- Título -->
        <div class="form-group">
          <label for="ev-titulo">Título del Evento</label>
          <input id="ev-titulo" type="text" class="form-control"
            placeholder="Ej: Culto Dominical" required />
        </div>

        <!-- Fecha + Horario -->
        <div class="form-row">
          <div class="form-group">
            <label for="ev-fecha">Fecha</label>
            <input id="ev-fecha" type="date" class="form-control" required />
          </div>
          <div class="form-group">
            <label for="ev-horario">Horario</label>
            <input id="ev-horario" type="text" class="form-control"
              placeholder="Ej: 10:00 AM - 12:00 PM" required />
          </div>
        </div>

        <!-- Ubicación + Asistentes -->
        <div class="form-row">
          <div class="form-group">
            <label for="ev-ubicacion">Ubicación</label>
            <input id="ev-ubicacion" type="text" class="form-control"
              placeholder="Ej: Santuario Principal" required />
          </div>
          <div class="form-group">
            <label for="ev-asistentes">Asistentes Esperados</label>
            <input id="ev-asistentes" type="text" class="form-control"
              placeholder="Ej: 200+" />
          </div>
        </div>

        <!-- Voluntarios necesarios + Descripción -->
        <div class="form-row">
          <div class="form-group">
            <label for="ev-voluntarios">Voluntarios Necesarios</label>
            <input id="ev-voluntarios" type="number" class="form-control"
              min="1" value="1" placeholder="Ej: 10" required />
          </div>
          <div class="form-group">
            <label for="ev-descripcion">Descripción</label>
            <textarea id="ev-descripcion" class="form-control" rows="3"
              placeholder="Descripción del evento (opcional)"></textarea>
          </div>
        </div>

        <!-- ── SECCIÓN DE RECURSOS DEL INVENTARIO ──────────────────────── -->
        <div class="form-group">
          <div class="ev-recursos-header">
            <label>Recursos del Inventario</label>
            <!-- Contador dinámico de recursos seleccionados -->
            <span id="contador-recursos" class="ev-contador">
              Ningún recurso seleccionado (opcional)
            </span>
          </div>

          <!-- Mensaje cuando no hay recursos disponibles en el inventario -->
          <div id="sin-recursos-msg" class="ev-sin-recursos-msg" style="display:none;">
            <i class="bx bx-error-circle"></i>
            No hay recursos disponibles en el inventario.
            <a href="recursos.html">Ir a Gestión de Recursos</a>
          </div>

          <!-- Grilla de tarjetas de recursos (generada por el controller) -->
          <div id="recursos-grid" class="ev-recursos-grid"></div>
        </div>

        <!-- Botón publicar -->
        <button type="submit" class="btn-submit">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            style="width:1.15rem;height:1.15rem;">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          Publicar Evento
        </button>

      </form>
    </div>

    <!-- ══ EVENTOS PUBLICADOS ═══════════════════════════════════════════════ -->
    <div class="ev-publicados-section">
      <h3 class="ev-publicados-titulo">
        <i class="bx bx-calendar-check"></i>
        Eventos Publicados
      </h3>
      <!-- Lista generada por el controller -->
      <div id="lista-eventos-publicados"></div>
    </div>

  </section>
</main>

<!-- ══ SCRIPTS ══════════════════════════════════════════════════════════ -->
<!-- Sidebar del admin -->
<script src="../../../controllers/sidebar.controller.js"></script>
<!-- Modelo de recursos (necesario para leer el inventario) -->
<script src="../../../models/recursos.model.js"></script>
<!-- Modelo de eventos (guardar y leer eventos publicados) -->
<script src="../../../models/eventos.model.js"></script>
<!-- Controlador de eventos -->
<script src="../../../controllers/eventos.controller.js"></script>

</body>
</html>
